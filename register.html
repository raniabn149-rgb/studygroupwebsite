<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - StudyGroup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .register-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .register-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 1100px;
            width: 100%;
        }
        .register-form {
            padding: 48px;
        }
        .register-banner {
            background: linear-gradient(135deg, #6366f1, #10b981);
            padding: 48px;
            color: white;
            height: 100%;
        }
        .btn-register {
            background: #6366f1;
            border: none;
            padding: 12px;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: #4f46e5;
            transform: translateY(-2px);
        }
        .form-control, .form-select {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #6366f1;
        }
        @media (max-width: 768px) {
            .register-form { padding: 30px; }
            .register-banner { padding: 30px; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="row g-0">
                <div class="col-md-7">
                    <div class="register-form">
                        <a href="index.html" class="text-decoration-none">
                            <h3 class="fw-bold" style="color: #6366f1;">StudyGroup</h3>
                        </a>
                        <h2 class="mt-4 mb-2">Créer un compte 🚀</h2>
                        <p class="text-secondary mb-4">Commence ton voyage d'apprentissage dès aujourd'hui</p>
                        
                        <form id="registerForm">
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold"><i class="fas fa-user me-2"></i>Prénom</label>
                                    <input type="text" class="form-control" id="regFirstname" placeholder="Ahmed" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold"><i class="fas fa-user me-2"></i>Nom</label>
                                    <input type="text" class="form-control" id="regLastname" placeholder="Ben Ali" required>
                                </div>
                            </div>
                            <div class="mb-3 mt-3">
                                <label class="form-label fw-semibold"><i class="fas fa-envelope me-2"></i>Email</label>
                                <input type="email" class="form-control" id="regEmail" placeholder="exemple@email.com" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold"><i class="fas fa-graduation-cap me-2"></i>Niveau d'étude</label>
                                <select class="form-control" id="regLevel">
                                    <option value="">Sélectionne ton niveau</option>
                                    <option>Collège</option>
                                    <option>Lycée</option>
                                    <option>Université</option>
                                    <option>Professionnel</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold"><i class="fas fa-user-tie me-2"></i>Je suis</label>
                                <select class="form-control" id="regRole">
                                    <option value="">Sélectionne ton rôle</option>
                                    <option value="eleve">Élève</option>
                                    <option value="professeur">Professeur</option>
                                </select>
                            </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold"><i class="fas fa-lock me-2"></i>Mot de passe</label>
                                    <input type="password" class="form-control" id="regPassword" placeholder="6 caractères minimum" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-semibold"><i class="fas fa-lock me-2"></i>Confirmer</label>
                                    <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirme ton mot de passe" required>
                                </div>
                            </div>
                            <div class="form-check my-4">
                                <input class="form-check-input" type="checkbox" id="acceptTerms" required>
                                <label class="form-check-label" for="acceptTerms">
                                    J'accepte les <a href="#" class="text-decoration-none">conditions d'utilisation</a>
                                </label>
                            </div>
                            <button type="submit" class="btn btn-register text-white w-100">S'inscrire gratuitement</button>
                            <div id="registerError" class="alert alert-danger mt-3 d-none"></div>
                        </form>
                        
                        <div class="text-center mt-4">
                            <p class="text-secondary">Déjà un compte ? <a href="login.html" class="text-decoration-none fw-semibold">Se connecter</a></p>
                        </div>
                    </div>
                </div>
                <div class="col-md-5 d-none d-md-block">
                    <div class="register-banner">
                        <h3 class="mb-4">🎓 Ce que tu vas obtenir :</h3>
                        <div class="mt-4">
                            <div class="mb-3"><i class="fas fa-check-circle me-2"></i> Accès à 500+ cours vidéo</div>
                            <div class="mb-3"><i class="fas fa-check-circle me-2"></i> Groupes d'étude exclusifs</div>
                            <div class="mb-3"><i class="fas fa-check-circle me-2"></i> Suivi personnalisé</div>
                            <div class="mb-3"><i class="fas fa-check-circle me-2"></i> Certificats de réussite</div>
                            <div class="mb-3"><i class="fas fa-check-circle me-2"></i> Support 24/7</div>
                        </div>
                        <div class="mt-5 pt-3">
                            <div class="alert alert-light text-dark rounded-4 text-center">
                                ✨ 7 jours d'essai gratuit • Sans engagement
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
