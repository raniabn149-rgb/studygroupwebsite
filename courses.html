<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cours - StudyGroup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: #f8fafc;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .course-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
            height: 100%;
        }
        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.1);
            border-color: #6366f1;
        }
        .course-img {
            height: 180px;
            object-fit: cover;
            width: 100%;
        }
        .category-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            padding: 5px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .btn-filter {
            border-radius: 50px;
            padding: 8px 24px;
            margin: 0 5px;
            transition: all 0.2s;
        }
        .btn-filter.active {
            background: #6366f1;
            color: white;
            border-color: #6366f1;
        }
        .search-box {
            border-radius: 60px;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            width: 100%;
            max-width: 400px;
        }
        .search-box:focus {
            outline: none;
            border-color: #6366f1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" style="color: #6366f1;" href="index.html">StudyGroup</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center gap-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
                <li class="nav-item"><a class="nav-link active fw-semibold" href="courses.html">Cours</a></li>
                <li class="nav-item" id="coursesAuthLinks">
                    <a href="login.html" class="btn btn-outline-primary me-2">Connexion</a>
                    <a href="register.html" class="btn btn-primary">Inscription</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<section class="py-5">
    <div class="container">
        <div class="text-center mb-4">
            <h1 class="fw-bold">Tous les <span style="color: #6366f1;">cours</span></h1>
            <p class="text-secondary">+500 cours dans toutes les matières, pour tous les niveaux</p>
        </div>
        
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
            <div class="position-relative">
                <i class="fas fa-search position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary"></i>
                <input type="text" id="searchCourse" class="search-box ps-5" placeholder="Rechercher un cours...">
            </div>
            <div class="d-flex flex-wrap gap-2">
                <button class="btn btn-filter active" data-filter="all">Tous</button>
                <button class="btn btn-filter" data-filter="math">Mathématiques</button>
                <button class="btn btn-filter" data-filter="physics">Physique</button>
                <button class="btn btn-filter" data-filter="cs">Informatique</button>
                <button class="btn btn-filter" data-filter="langues">Langues</button>
            </div>
        </div>
        
        <div class="row g-4" id="coursesContainer">
            <!-- Les cours seront chargés dynamiquement via JS -->
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
